<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=9">
</head>
<body>

<!-- 인증 화면 -->
<div id="auth-section">
    <div class="auth-box">
        <div class="auth-logo">
            <h1>To-Do List</h1>
            <p>할 일을 체계적으로 관리하세요</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab-btn active" onclick="showTab('login')">로그인</button>
            <button class="auth-tab-btn" onclick="showTab('register')">회원가입</button>
        </div>

        <div class="auth-card">
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">이메일</label>
                    <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">비밀번호</label>
                    <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">로그인</button>
            </form>

            <form id="register-form" style="display:none;">
                <div class="form-group">
                    <label class="form-label">이메일</label>
                    <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">비밀번호</label>
                    <input type="password" id="reg-password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary green">가입하기</button>
            </form>

            <div id="auth-error" class="auth-error"></div>
        </div>
    </div>
</div>

<!-- 메인 화면 -->
<div id="main-section">
    <header class="topbar">
        <span class="topbar-logo">To-Do List</span>
        <div class="topbar-right">
            <span id="stats"></span>
            <button class="btn-dark-toggle" onclick="toggleDark()" title="다크 모드">◑</button>
            <button class="btn-logout" onclick="logout()">로그아웃</button>
        </div>
    </header>

    <div class="main-body">
        <div class="stats-dashboard">
            <div class="stat-card">
                <span class="stat-label">전체</span>
                <span class="stat-value" id="stat-total">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">진행 중</span>
                <span class="stat-value stat-active" id="stat-active">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">완료</span>
                <span class="stat-value stat-done" id="stat-done">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">완료율</span>
                <span class="stat-value stat-rate" id="stat-rate">0%</span>
            </div>
        </div>

        <div class="add-card">
            <form id="todo-form">
                <div class="add-row">
                    <input type="text" id="title" class="add-title" placeholder="할 일을 입력하세요" required>
                    <button type="submit" class="btn-add">추가</button>
                </div>
                <div class="add-meta">
                    <select id="priority" class="form-select">
                        <option value="low">낮음</option>
                        <option value="medium" selected>보통</option>
                        <option value="high">높음</option>
                    </select>
                    <select id="category" class="form-select">
                        <option value="general">일반</option>
                        <option value="study">공부</option>
                        <option value="work">업무</option>
                        <option value="personal">개인</option>
                        <option value="health">건강</option>
                    </select>
                    <input type="date" id="due_date" class="add-date">
                </div>
                <textarea id="description" class="add-desc" placeholder="메모 (선택사항)" rows="2"></textarea>
            </form>
        </div>

        <div class="search-wrap">
            <div class="search-input-wrap">
                <span class="search-icon-inner">&#128269;</span>
                <input type="text" id="search-input" class="search-input" placeholder="할 일 검색..." oninput="renderTodos()" onkeydown="if(event.key==='Enter') renderTodos()">
                <button class="search-clear" id="search-clear" onclick="clearSearch()" style="display:none" title="초기화">✕</button>
            </div>
            <button class="search-btn" onclick="renderTodos()">검색</button>
        </div>

        <div class="toolbar">
            <div class="filter-tabs">
                <button class="filter-btn active" onclick="filterTodos('all', this)">전체</button>
                <button class="filter-btn" onclick="filterTodos('active', this)">진행 중</button>
                <button class="filter-btn" onclick="filterTodos('completed', this)">완료</button>
            </div>
            <div class="sort-tabs">
                <button class="sort-btn active" onclick="setSort('default', this)">등록순</button>
                <button class="sort-btn" onclick="setSort('priority', this)">우선순위</button>
                <button class="sort-btn" onclick="setSort('date', this)">날짜순</button>
            </div>
        </div>

        <div class="category-filter" id="category-filter">
            <button class="cat-btn active" onclick="filterCategory('all', this)">전체</button>
            <button class="cat-btn" onclick="filterCategory('general', this)">일반</button>
            <button class="cat-btn" onclick="filterCategory('study', this)">공부</button>
            <button class="cat-btn" onclick="filterCategory('work', this)">업무</button>
            <button class="cat-btn" onclick="filterCategory('personal', this)">개인</button>
            <button class="cat-btn" onclick="filterCategory('health', this)">건강</button>
        </div>

        <div id="search-result-info" style="display:none" class="search-result-info"></div>

        <div id="todo-list"></div>
    </div>
</div>

<!-- 수정 모달 -->
<div class="modal-overlay" id="editOverlay">
    <div class="modal-box">
        <div class="modal-header">
            <h3>할 일 수정</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label class="form-label">제목</label>
                <input type="text" id="edit-title" class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label">메모</label>
                <textarea id="edit-description" class="form-input" rows="2" style="resize:none;"></textarea>
            </div>
            <div class="modal-row">
                <div class="form-group">
                    <label class="form-label">우선순위</label>
                    <select id="edit-priority" class="form-input" style="cursor:pointer;">
                        <option value="low">낮음</option>
                        <option value="medium">보통</option>
                        <option value="high">높음</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">카테고리</label>
                    <select id="edit-category" class="form-input" style="cursor:pointer;">
                        <option value="general">일반</option>
                        <option value="study">공부</option>
                        <option value="work">업무</option>
                        <option value="personal">개인</option>
                        <option value="health">건강</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">완료일</label>
                <input type="date" id="edit-due_date" class="form-input">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-save" onclick="submitEdit()">저장</button>
        </div>
    </div>
</div>

<script src="/static/js/app.js?v=9"></script>
</body>
</html>
