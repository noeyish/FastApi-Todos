<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List v2.0.0</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .todo-completed {
            text-decoration: line-through;
            color: #6c757d;
        }
        .priority-high { border-left: 5px solid #dc3545; }
        .priority-medium { border-left: 5px solid #ffc107; }
        .priority-low { border-left: 5px solid #198754; }
        body { background-color: #f8f9fa; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="display-5 fw-bold text-primary">To-Do List <span class="badge bg-secondary fs-6">v2.0.0</span></h1>
                    <div id="stats" class="text-muted"></div>
                </div>

                <!-- 입력 폼 -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form id="todo-form" class="row g-3">
                            <div class="col-md-6">
                                <input type="text" id="title" class="form-control" placeholder="할 일 제목" required>
                            </div>
                            <div class="col-md-4">
                                <select id="priority" class="form-select">
                                    <option value="low">낮음</option>
                                    <option value="medium" selected>보통</option>
                                    <option value="high">높음</option>
                                </select>
                            </div>
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-primary w-100">추가</button>
                            </div>
                            <div class="col-12">
                                <textarea id="description" class="form-control" placeholder="상세 내용" rows="2"></textarea>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- 필터 탭 -->
                <ul class="nav nav-pills mb-3" id="pills-tab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" onclick="filterTodos('all')">전체</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" onclick="filterTodos('active')">진행 중</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" onclick="filterTodos('completed')">완료</button>
                    </li>
                </ul>

                <!-- 할 일 목록 -->
                <div id="todo-list" class="list-group shadow-sm">
                    <!-- 자바스크립트로 동적 생성됨 -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let allTodos = [];
        let currentFilter = 'all';

        async function fetchTodos() {
            try {
                const response = await fetch('/todos');
                allTodos = await response.json();
                renderTodos();
            } catch (error) {
                console.error('Error fetching todos:', error);
            }
        }

        function renderTodos() {
            const todoList = document.getElementById('todo-list');
            const stats = document.getElementById('stats');
            todoList.innerHTML = '';

            const filteredTodos = allTodos.filter(todo => {
                if (currentFilter === 'active') return !todo.completed;
                if (currentFilter === 'completed') return todo.completed;
                return true;
            });

            // 통계 업데이트
            const completedCount = allTodos.filter(t => t.completed).length;
            stats.textContent = `전체 ${allTodos.length} | 완료 ${completedCount} | 남음 ${allTodos.length - completedCount}`;

            if (filteredTodos.length === 0) {
                todoList.innerHTML = '<div class="list-group-item text-center py-4 text-muted">할 일이 없습니다.</div>';
                return;
            }

            filteredTodos.forEach(todo => {
                const item = document.createElement('div');
                item.className = `list-group-item list-group-item-action priority-${todo.priority} mb-2 border rounded shadow-sm`;
                
                const priorityBadge = {
                    'high': '<span class="badge bg-danger">높음</span>',
                    'medium': '<span class="badge bg-warning text-dark">보통</span>',
                    'low': '<span class="badge bg-success">낮음</span>'
                }[todo.priority];

                item.innerHTML = `
                    <div class="d-flex w-100 justify-content-between align-items-center">
                        <div class="form-check flex-grow-1">
                            <input class="form-check-input mt-2" type="checkbox" ${todo.completed ? 'checked' : ''} 
                                   onchange="toggleTodo(${todo.id})">
                            <h5 class="mb-1 ${todo.completed ? 'todo-completed' : ''}">${todo.title} ${priorityBadge}</h5>
                            <p class="mb-1 text-muted small">${todo.description || '내용 없음'}</p>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-outline-secondary btn-sm" onclick="editTodo(${todo.id})"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-outline-danger btn-sm" onclick="deleteTodo(${todo.id})"><i class="bi bi-trash"></i></button>
                        </div>
                    </div>
                `;
                todoList.appendChild(item);
            });
        }

        function filterTodos(filter) {
            currentFilter = filter;
            document.querySelectorAll('.nav-link').forEach(btn => {
                btn.classList.toggle('active', btn.textContent.includes(filter === 'all' ? '전체' : (filter === 'active' ? '진행' : '완료')));
            });
            renderTodos();
        }

        async function toggleTodo(id) {
            const response = await fetch(`/todos/${id}/toggle`, { method: 'PATCH' });
            if (response.ok) fetchTodos();
        }

        async function deleteTodo(id) {
            if (confirm('정말로 삭제하시겠습니까?')) {
                const response = await fetch(`/todos/${id}`, { method: 'DELETE' });
                if (response.ok) fetchTodos();
            }
        }

        async function editTodo(id) {
            const todo = allTodos.find(t => t.id === id);
            const newTitle = prompt('새 제목:', todo.title);
            if (newTitle === null) return;
            
            const newDesc = prompt('새 내용:', todo.description);
            
            const response = await fetch(`/todos/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    ...todo, 
                    title: newTitle, 
                    description: newDesc 
                })
            });
            if (response.ok) fetchTodos();
        }

        document.getElementById('todo-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const priority = document.getElementById('priority').value;
            const description = document.getElementById('description').value;

            const response = await fetch('/todos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    id: Date.now(), 
                    title, 
                    description, 
                    completed: false,
                    priority 
                })
            });

            if (response.ok) {
                e.target.reset();
                fetchTodos();
            }
        });

        fetchTodos();
    </script>
</body>
</html>
