<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .todo-completed { text-decoration: line-through; color: #6c757d; }
        .priority-high  { border-left: 5px solid #dc3545; }
        .priority-medium{ border-left: 5px solid #ffc107; }
        .priority-low   { border-left: 5px solid #198754; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<!-- 인증 화면 -->
<div id="auth-section" class="container py-5" style="max-width:420px;">
    <h2 class="text-center text-primary fw-bold mb-4">To-Do List</h2>

    <!-- 탭 -->
    <ul class="nav nav-pills nav-fill mb-4" id="authTab">
        <li class="nav-item">
            <button class="nav-link active" onclick="showTab('login')">로그인</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="showTab('register')">회원가입</button>
        </li>
    </ul>

    <div class="card shadow-sm">
        <div class="card-body p-4">
            <!-- 로그인 폼 -->
            <form id="login-form">
                <div class="mb-3">
                    <input type="email" id="login-email" class="form-control" placeholder="이메일" required>
                </div>
                <div class="mb-3">
                    <input type="password" id="login-password" class="form-control" placeholder="비밀번호" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">로그인</button>
            </form>

            <!-- 회원가입 폼 -->
            <form id="register-form" style="display:none;">
                <div class="mb-3">
                    <input type="email" id="reg-email" class="form-control" placeholder="이메일" required>
                </div>
                <div class="mb-3">
                    <input type="password" id="reg-password" class="form-control" placeholder="비밀번호" required>
                </div>
                <button type="submit" class="btn btn-success w-100">회원가입</button>
            </form>

            <div id="auth-error" class="alert alert-danger mt-3 d-none"></div>
        </div>
    </div>
</div>

<!-- 메인 화면 -->
<div id="main-section" class="container py-5" style="display:none;">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="display-5 fw-bold text-primary">To-Do List</h1>
                <div class="d-flex align-items-center gap-3">
                    <span id="stats" class="text-muted small"></span>
                    <button class="btn btn-outline-secondary btn-sm" onclick="logout()">
                        <i class="bi bi-box-arrow-right"></i> 로그아웃
                    </button>
                </div>
            </div>

            <!-- 입력 폼 -->
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form id="todo-form" class="row g-3">
                        <div class="col-md-6">
                            <input type="text" id="title" class="form-control" placeholder="할 일 제목" required>
                        </div>
                        <div class="col-md-4">
                            <select id="priority" class="form-select">
                                <option value="low">낮음</option>
                                <option value="medium" selected>보통</option>
                                <option value="high">높음</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">추가</button>
                        </div>
                        <div class="col-12">
                            <textarea id="description" class="form-control" placeholder="상세 내용" rows="2"></textarea>
                        </div>
                    </form>
                </div>
            </div>

            <!-- 필터 탭 -->
            <ul class="nav nav-pills mb-3">
                <li class="nav-item">
                    <button class="nav-link active" onclick="filterTodos('all', this)">전체</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" onclick="filterTodos('active', this)">진행 중</button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" onclick="filterTodos('completed', this)">완료</button>
                </li>
            </ul>

            <!-- 할 일 목록 -->
            <div id="todo-list" class="list-group shadow-sm"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let allTodos = [];
    let currentFilter = 'all';

    // ── 인증 헬퍼 ──────────────────────────────────────────────
    function getToken() { return localStorage.getItem('token'); }
    function setToken(t) { localStorage.setItem('token', t); }
    function clearToken() { localStorage.removeItem('token'); }

    function authHeaders() {
        return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}` };
    }

    async function apiFetch(url, options = {}) {
        const res = await fetch(url, { ...options, headers: authHeaders() });
        if (res.status === 401) { logout(); return null; }
        return res;
    }

    // ── 화면 전환 ────────────────────────────────────────────
    function showMain() {
        document.getElementById('auth-section').style.display = 'none';
        document.getElementById('main-section').style.display = '';
        fetchTodos();
    }

    function showAuth() {
        document.getElementById('auth-section').style.display = '';
        document.getElementById('main-section').style.display = 'none';
    }

    function showTab(tab) {
        document.getElementById('login-form').style.display    = tab === 'login'    ? '' : 'none';
        document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
        document.querySelectorAll('#authTab .nav-link').forEach((btn, i) => {
            btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
        });
        document.getElementById('auth-error').classList.add('d-none');
    }

    function showAuthError(msg) {
        const el = document.getElementById('auth-error');
        el.textContent = msg;
        el.classList.remove('d-none');
    }

    function logout() {
        clearToken();
        allTodos = [];
        showAuth();
    }

    // ── 로그인 / 회원가입 ──────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email    = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (res.ok) {
            const data = await res.json();
            setToken(data.access_token);
            showMain();
        } else {
            const err = await res.json();
            showAuthError(err.detail || '로그인 실패');
        }
    });

    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email    = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        const res = await fetch('/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (res.ok) {
            showAuthError('');
            document.getElementById('auth-error').classList.add('d-none');
            // 자동 로그인
            const loginRes = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (loginRes.ok) {
                const data = await loginRes.json();
                setToken(data.access_token);
                showMain();
            }
        } else {
            const err = await res.json();
            showAuthError(err.detail || '회원가입 실패');
        }
    });

    // ── Todo CRUD ──────────────────────────────────────────────
    async function fetchTodos() {
        const res = await apiFetch('/todos');
        if (!res) return;
        allTodos = await res.json();
        renderTodos();
    }

    function renderTodos() {
        const list  = document.getElementById('todo-list');
        const stats = document.getElementById('stats');
        list.innerHTML = '';

        const filtered = allTodos.filter(t => {
            if (currentFilter === 'active')    return !t.completed;
            if (currentFilter === 'completed') return  t.completed;
            return true;
        });

        const done = allTodos.filter(t => t.completed).length;
        stats.textContent = `전체 ${allTodos.length} | 완료 ${done} | 남음 ${allTodos.length - done}`;

        if (filtered.length === 0) {
            list.innerHTML = '<div class="list-group-item text-center py-4 text-muted">할 일이 없습니다.</div>';
            return;
        }

        const badges = {
            high:   '<span class="badge bg-danger">높음</span>',
            medium: '<span class="badge bg-warning text-dark">보통</span>',
            low:    '<span class="badge bg-success">낮음</span>'
        };

        filtered.forEach(todo => {
            const item = document.createElement('div');
            item.className = `list-group-item list-group-item-action priority-${todo.priority} mb-2 border rounded shadow-sm`;
            item.innerHTML = `
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <div class="form-check flex-grow-1">
                        <input class="form-check-input mt-2" type="checkbox" ${todo.completed ? 'checked' : ''}
                               onchange="toggleTodo(${todo.id})">
                        <h5 class="mb-1 ${todo.completed ? 'todo-completed' : ''}">${todo.title} ${badges[todo.priority] || ''}</h5>
                        <p class="mb-1 text-muted small">${todo.description || '내용 없음'}</p>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-outline-secondary btn-sm" onclick="editTodo(${todo.id})">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-outline-danger btn-sm" onclick="deleteTodo(${todo.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>`;
            list.appendChild(item);
        });
    }

    function filterTodos(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.nav-pills .nav-link').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTodos();
    }

    async function toggleTodo(id) {
        const res = await apiFetch(`/todos/${id}/toggle`, { method: 'PATCH' });
        if (res && res.ok) fetchTodos();
    }

    async function deleteTodo(id) {
        if (!confirm('정말로 삭제하시겠습니까?')) return;
        const res = await apiFetch(`/todos/${id}`, { method: 'DELETE' });
        if (res && res.ok) fetchTodos();
    }

    async function editTodo(id) {
        const todo = allTodos.find(t => t.id === id);
        const newTitle = prompt('새 제목:', todo.title);
        if (newTitle === null) return;
        const newDesc = prompt('새 내용:', todo.description);

        const res = await apiFetch(`/todos/${id}`, {
            method: 'PUT',
            body: JSON.stringify({ title: newTitle, description: newDesc })
        });
        if (res && res.ok) fetchTodos();
    }

    document.getElementById('todo-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await apiFetch('/todos', {
            method: 'POST',
            body: JSON.stringify({
                title:       document.getElementById('title').value,
                priority:    document.getElementById('priority').value,
                description: document.getElementById('description').value
            })
        });
        if (res && res.ok) {
            e.target.reset();
            fetchTodos();
        }
    });

    // ── 초기 진입 ─────────────────────────────────────────────
    if (getToken()) {
        showMain();
    } else {
        showAuth();
    }
</script>
</body>
</html>
